name: Build, publish and release Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CONTEXT_DIR: .
  DOCKERFILE: Dockerfile
  DOCKER_NAMESPACE: bvdcode
  DOCKER_IMAGE_NAME: peertube-runner-gpu
  VALIDATION_IMAGE: peertube-runner-gpu:${{ github.sha }}

jobs:
  build:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    outputs:
      Version: ${{ steps.gitversion.outputs.SemVer }}
      CommitsSinceVersionSource: ${{ steps.gitversion.outputs.CommitsSinceVersionSource }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: "true"

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v0.9.7
        with:
          versionSpec: 5.x

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v0.9.7

      - name: Display GitVersion outputs
        run: |
          echo "Version: ${{ steps.gitversion.outputs.SemVer }}"
          echo "CommitsSinceVersionSource: ${{ steps.gitversion.outputs.CommitsSinceVersionSource }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for validation
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT_DIR }}
          file: ${{ env.DOCKERFILE }}
          load: true
          tags: ${{ env.VALIDATION_IMAGE }}

      - name: Smoke test Docker image
        run: |
          set -euo pipefail
          docker run --rm --entrypoint ffmpeg "${VALIDATION_IMAGE}" -version
          docker run --rm --entrypoint ffmpeg "${VALIDATION_IMAGE}" -encoders > ffmpeg-encoders.txt
          grep -q h264_nvenc ffmpeg-encoders.txt
          docker run --rm --entrypoint python "${VALIDATION_IMAGE}" -c "import ctranslate2; print(ctranslate2.__version__)"
          docker run --rm --entrypoint whisper-ctranslate2 "${VALIDATION_IMAGE}" --help
          docker run --rm --entrypoint peertube-runner "${VALIDATION_IMAGE}" --help

          CONFIG_VOLUME="peertube-runner-config-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          CACHE_VOLUME="peertube-runner-cache-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          cleanup() {
            docker volume rm -f "${CONFIG_VOLUME}" "${CACHE_VOLUME}" >/dev/null 2>&1 || true
          }

          trap cleanup EXIT
          docker volume create "${CONFIG_VOLUME}" >/dev/null
          docker volume create "${CACHE_VOLUME}" >/dev/null

          docker run --rm \
            -v "${CONFIG_VOLUME}:/home/runner/.config/peertube-runner-nodejs" \
            -v "${CACHE_VOLUME}:/home/runner/.cache" \
            --entrypoint bash \
            "${VALIDATION_IMAGE}" \
            -lc 'mkdir -p /home/runner/.config/peertube-runner-nodejs/default /home/runner/.cache && chown -R root:root /home/runner/.config/peertube-runner-nodejs /home/runner/.cache'

          set +e
          docker run --rm \
            -v "${CONFIG_VOLUME}:/home/runner/.config/peertube-runner-nodejs" \
            -v "${CACHE_VOLUME}:/home/runner/.cache" \
            "${VALIDATION_IMAGE}" > entrypoint-volume.log 2>&1
          ENTRYPOINT_STATUS=$?
          set -e

          cat entrypoint-volume.log
          if [ "${ENTRYPOINT_STATUS}" -eq 0 ]; then
            echo "Expected entrypoint to fail without required registration environment"
            exit 1
          fi

          grep -q "PEERTUBE_RUNNER_URL and PEERTUBE_RUNNER_TOKEN environment variables are required" entrypoint-volume.log
          ! grep -q "Cannot create config directory" entrypoint-volume.log

          docker run --rm \
            -v "${CONFIG_VOLUME}:/home/runner/.config/peertube-runner-nodejs" \
            -v "${CACHE_VOLUME}:/home/runner/.cache" \
            --entrypoint bash \
            "${VALIDATION_IMAGE}" \
            -lc 'gosu runner test -w /home/runner/.config/peertube-runner-nodejs/default && gosu runner test -w /home/runner/.cache'

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT_DIR }}
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: |
            ${{ env.DOCKER_NAMESPACE }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.gitversion.outputs.SemVer }}
            ${{ env.DOCKER_NAMESPACE }}/${{ env.DOCKER_IMAGE_NAME }}:v${{ steps.gitversion.outputs.SemVer }}
            ${{ env.DOCKER_NAMESPACE }}/${{ env.DOCKER_IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.gitversion.outputs.SemVer }}
            ghcr.io/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE_NAME }}:v${{ steps.gitversion.outputs.SemVer }}
            ghcr.io/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE_NAME }}:latest

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && needs.build.outputs.CommitsSinceVersionSource > 0
    permissions:
      contents: write
    steps:
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.build.outputs.Version }}
          name: Release v${{ needs.build.outputs.Version }}
          generateReleaseNotes: true
